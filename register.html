<!DOCTYPE html>

<html>

<head>

<title>Customer Registration</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>Create Your Account</h1>


<form action="https://formsubmit.co/manueliwakilau01@gmail.com" method="POST">


<label>
Customer Type
</label>


<select name="Customer Type">

<option>
Individual
</option>

<option>
Company
</option>

</select>


<input 
type="text"
name="Name"
placeholder="Full Name / Company Name"
required>


<input 
type="email"
name="Email"
placeholder="Email Address"
required>


<input 
type="text"
name="Phone"
placeholder="Phone Number"
required>


<input 
type="text"
name="Address"
placeholder="Address">


<textarea 
name="Service">

Tell us what service you need

</textarea>


<button type="submit">

Submit Request

</button>


</form>



</body>

</html>
